name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Unit + data + integration tests
        run: pytest --cov=churn --cov-report=term-missing

      - name: Model quality gate
        # Fails the build if AUC on holdout drops below the threshold
        # encoded in tests/test_model.py.
        run: pytest tests/test_model.py -q
