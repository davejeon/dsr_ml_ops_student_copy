# docker-compose.yml — iris inference service
#
# Run from this directory (day2/Session_2/):
#   docker compose up --build        # build image and start
#   docker compose up                # start with existing image (faster)
#   docker compose down              # stop and remove the container
#   docker compose logs -f iris-api  # follow logs
#
# Prerequisite: run day2/Session_1/train.py first.

services:
  iris-api:
    build:
      # Build context is the repo root so the Dockerfile can reach Session_1
      context: ../..
      dockerfile: day2/Session_2/Dockerfile
    image: iris-svc:1.0
    container_name: iris-api
    ports:
      - "8000:8000"
    environment:
      # Keep Python output unbuffered so logs appear immediately
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: "no"    # change to "unless-stopped" for long-running deployments
