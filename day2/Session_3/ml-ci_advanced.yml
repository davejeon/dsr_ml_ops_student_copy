# .github/workflows/ml-ci.yml
#
# ML CI pipeline for the iris classifier.
#
# This file is placed in day2/Session_3/ for learning purposes.
# In a real repo it would live at .github/workflows/ml-ci.yml
# and be picked up automatically by GitHub Actions.
#
# To use it in a real repo:
#   cp day2/Session_3/ml-ci.yml .github/workflows/ml-ci.yml
#
# ── What this pipeline does ──────────────────────────────────────────────────
#
#  Job 1: ci  (runs on every push and pull request)
#    - Lint with ruff (fast style + import checks)
#    - Run data tests   (test_data.py)   — validate the training data
#    - Run model tests  (test_model.py)  — quality gates on the trained model
#
#  Job 2: integration  (runs after ci passes, on push to main only)
#    - Start the FastAPI service
#    - Run integration tests (test_service.py) against it
#    - Stop the service
#
#  The integration job is gated on main to avoid wasting CI minutes on
#  every feature branch push — run integration tests locally or on PR merge.
#
# ── What is NOT in this pipeline (for brevity) ───────────────────────────────
#  - Docker build + push to registry
#  - Continuous Training (CT) — that would retrain and compare with the
#    registered model in MLflow; shown as a comment sketch at the bottom.
#  - Deployment (CD) — canary / blue-green rollout after a new model is registered.

name: ml-ci

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:

  # ── Job 1: CI — lint + data tests + model tests ─────────────────────────────
  ci:
    name: CI — lint, data, model
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Lint ──────────────────────────────────────────────────────────────
      # ruff is a fast Python linter (replaces flake8 + isort + pyupgrade).
      # It catches import errors, undefined names, and style issues in seconds.
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check day2/Session_1/ day2/Session_3/

      # ── Train the model ───────────────────────────────────────────────────
      # The CI pipeline trains a fresh model from the committed data.
      # In a real CT pipeline this step would also compare the new model
      # against the registered production model (see sketch at bottom).
      - name: Train iris classifier
        run: python day2/Session_1/train.py

      # ── Data tests ────────────────────────────────────────────────────────
      # Validate the training data BEFORE the model is registered.
      # If the data is bad, there is no point running model tests.
      - name: Run data tests
        run: |
          pytest day2/Session_3/test_data.py -v \
            --tb=short \
            -p no:warnings

      # ── Model quality + behavioural tests ─────────────────────────────────
      - name: Run model tests
        run: |
          pytest day2/Session_3/test_model.py -v \
            --tb=short \
            -p no:warnings

  # ── Job 2: Integration — start service, test it, stop it ────────────────────
  integration:
    name: Integration — service tests
    runs-on: ubuntu-latest
    needs: ci                          # only runs if ci passes
    if: github.ref == 'refs/heads/main'  # only on pushes to main

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train iris classifier
        run: python day2/Session_1/train.py

      # Start the service in the background. The & puts it in a background
      # process; we then poll /health until it responds.
      - name: Start FastAPI service
        run: |
          uvicorn service:app --app-dir day2/Session_1 --port 8000 &
          echo "Waiting for service to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Service is up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run integration tests
        run: |
          pytest day2/Session_3/test_service.py -v \
            --tb=short \
            -p no:warnings

      - name: Stop service
        if: always()   # run even if the tests failed, to clean up
        run: kill $(lsof -ti:8000) 2>/dev/null || true

